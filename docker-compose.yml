services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quangvpp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quangvpp-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-docker-secret-change-me}
      JWT_EXPIRES_IN: 7d
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
      DB_NAME: VanPhongPham_DB
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERT: "true"
      FRONTEND_BASE_URL: http://localhost:5173
      ADMIN_FRONTEND_URL: http://localhost:5174
      AI_CHAT_ENABLED: "false"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data: